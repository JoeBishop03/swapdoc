name: Trigger auto deployment for swapdoc

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/swapdoc-AutoDeployTrigger-0f6e54aa-7efc-4f60-bbf3-806b6442495e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SWAPDOC_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SWAPDOC_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SWAPDOC_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: swapdocjoe2026.azurecr.io
          registryUsername: ${{ secrets.SWAPDOC_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SWAPDOC_REGISTRY_PASSWORD }}
          containerAppName: swapdoc
          resourceGroup: swapdocjoe2026
          imageToBuild: swapdocjoe2026.azurecr.io/swapdoc:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


